version: 2
updates:
  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      pip-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/ui'
    schedule:
      interval: 'weekly'
    groups:
      npm-dependencies:
        patterns:
          - '*'
    ignore:
      - dependency-name: 'typescript'
