[tool.ruff]
line-length = 160

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "RUF"]
ignore = [
    # Intentional in educational examples
    "B009",    # getattr with constant — used to demonstrate dynamic attribute access
    "B010",    # setattr with constant — used to demonstrate namedtuple immutability
    "B024",    # abstract base class without abstract methods — intentional in meta_class
    "B905",    # zip without strict= — educational examples don't need strict enforcement
    "C406",    # unnecessary list literal in dict() — intentional dict() constructor demo
    "C408",    # unnecessary dict() call — intentional dict() constructor demo
    "C416",    # unnecessary comprehension — intentional comprehension/iterator demos
    "RUF005",  # collection literal concatenation — intentional tuple concat demo
    "RUF012",  # mutable class default — intentional in meta_class example
]

[tool.coverage.run]
source = ["ultimatepython"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "skip: (if|else)",
    "def __repr__",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "any\\("
]
fail_under = 80
omit = [
    "venv/**",
    "runner.py",
    "**/__init__.py"
]
